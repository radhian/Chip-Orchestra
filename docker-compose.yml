services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chip_orchestra}
      MYSQL_USER: ${MYSQL_USER:-chip}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chip}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chiproot}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD:-chiproot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  orchestrator-service:
    build:
      context: ./orchestrator-service
    environment:
      PORT: 8080
      MYSQL_DSN: ${MYSQL_USER:-chip}:${MYSQL_PASSWORD:-chip}@tcp(mysql:3306)/${MYSQL_DATABASE:-chip_orchestra}?charset=utf8mb4&parseTime=True&loc=UTC
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-chip-orchestra-secret}
      AGENT_SERVICE_URL: http://agent-service:8001
      EDA_SERVICE_URL: http://eda-service:8002
      AGENT_INVOKE_TIMEOUT_SECONDS: ${AGENT_INVOKE_TIMEOUT_SECONDS:-1800}
      SIM_AUTO_REPAIR_ROUNDS: ${SIM_AUTO_REPAIR_ROUNDS:-10}
      HARDEN_AUTO_REPAIR_ROUNDS: ${HARDEN_AUTO_REPAIR_ROUNDS:-3}
      GF180_VOLTAGE: ${GF180_VOLTAGE:-3v3}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      DEFAULT_FULL_NAME: ${DEFAULT_FULL_NAME:-Admin Admin}
      DEFAULT_EMAIL: ${DEFAULT_EMAIL:-admin.local}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-chip-orchestra}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-service:
        condition: service_started
      eda-service:
        condition: service_started
    ports:
      - "${OPERATOR_PORT:-8080}:8080"
    volumes:
      - workspace_data:${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  agent-service:
    build:
      context: ./agent-service
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-chip}:${MYSQL_PASSWORD:-chip}@mysql:3306/${MYSQL_DATABASE:-chip_orchestra}
      REDIS_URL: redis://redis:6379/0
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      DEFAULT_FULL_NAME: ${DEFAULT_FULL_NAME:-Admin Admin}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
      AGENT_ARTIFACT_ROOT: ${AGENT_ARTIFACT_ROOT:-/tmp/chip-orchestra/workspaces}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-5.2:cloud}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-600}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-32768}
      OLLAMA_THINK: ${OLLAMA_THINK:-1}
      OLLAMA_REPEAT_PENALTY: ${OLLAMA_REPEAT_PENALTY:-1.18}
      OLLAMA_REPEAT_LAST_N: ${OLLAMA_REPEAT_LAST_N:-256}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-8192}
      OLLAMA_VISION_NUM_CTX: ${OLLAMA_VISION_NUM_CTX:-8192}
      OLLAMA_VISION_TIMEOUT: ${OLLAMA_VISION_TIMEOUT:-240}
      GARUDA_VISION: ${GARUDA_VISION:-}
      GARUDA_VISION_MODEL: ${GARUDA_VISION_MODEL:-}
      AGENT_DEEP_AGENTS: ${AGENT_DEEP_AGENTS:-1}
      GARUDA_DEEP_BUDGET_S: ${GARUDA_DEEP_BUDGET_S:-2400}
      GARUDA_PY_TIMEOUT_S: ${GARUDA_PY_TIMEOUT_S:-600}
      AGENT_PYDEPS_DIR: ${AGENT_PYDEPS_DIR:-}
      AGENT_WEB_RESEARCH: ${AGENT_WEB_RESEARCH:-1}
      SEARXNG_URL: ${SEARXNG_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GARUDA_RESEARCH_BUDGET_S: ${GARUDA_RESEARCH_BUDGET_S:-420}
      GARUDA_CLONE_TIMEOUT_S: ${GARUDA_CLONE_TIMEOUT_S:-90}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-glm-4.6}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-pro}
      MAX_REPAIR_ITERS: ${MAX_REPAIR_ITERS:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${AGENT_PORT:-8001}:8001"
    volumes:
      - workspace_data:${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  eda-service:
    build:
      context: ./eda-service
      args:
        PDK_ROOT: ${PDK_ROOT:-/opt/pdk}
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-chip}:${MYSQL_PASSWORD:-chip}@mysql:3306/${MYSQL_DATABASE:-chip_orchestra}
      REDIS_URL: redis://redis:6379/0
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
      IVERILOG_BIN: ${IVERILOG_BIN:-iverilog}
      IVERILOG_PATH: ${IVERILOG_PATH:-}
      VVP_BIN: ${VVP_BIN:-vvp}
      VVP_PATH: ${VVP_PATH:-}
      LIBRELANE_BIN: ${LIBRELANE_BIN:-librelane}
      LIBRELANE_PATH: ${LIBRELANE_PATH:-}
      YOSYS_BIN: ${YOSYS_BIN:-yosys}
      STA_BIN: ${STA_BIN:-sta}
      STA_PATH: ${STA_PATH:-}
      KLAYOUT_BIN: ${KLAYOUT_BIN:-klayout}
      DOT_PATH: ${DOT_PATH:-dot}
      PDK: ${PDK:-gf180mcuD}
      GF180_VOLTAGE: ${GF180_VOLTAGE:-3v3}
      PDK_ROOT: ${PDK_ROOT:-/opt/pdk}
      EDA_JOB_TIMEOUT_SIM: ${EDA_JOB_TIMEOUT_SIM:-600}
      EDA_JOB_TIMEOUT_HARDEN: ${EDA_JOB_TIMEOUT_HARDEN:-3600}
      EDA_JOB_TIMEOUT_STA: ${EDA_JOB_TIMEOUT_STA:-900}
      EDA_JOB_TIMEOUT_GL_SIM: ${EDA_JOB_TIMEOUT_GL_SIM:-900}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EDA_PORT:-8002}:8002"
    volumes:
      - workspace_data:${WORKSPACE_ROOT:-/tmp/chip-orchestra/workspaces}
      - pdk_data:${PDK_ROOT:-/opt/pdk}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_USE_MOCKS: "false"
      VITE_DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      VITE_DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-chip-orchestra}
    depends_on:
      orchestrator-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http=require('http');http.get('http://localhost:4173',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
  redis_data:
  workspace_data:
  pdk_data:

upstream chip_orchestrator {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.chip-orchestra.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.chip-orchestra.example.com;

    ssl_certificate /etc/letsencrypt/live/api.chip-orchestra.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.chip-orchestra.example.com/privkey.pem;
    client_max_body_size 100m;

    location /health {
        proxy_pass http://chip_orchestrator/health;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_pass http://chip_orchestrator;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600;
        proxy_pass http://chip_orchestrator;
    }
}
